    <nav>

        </div>

  <a href="/inbox" style="margin-right: 1rem; text-decoration: none; color: black;">

      <div class="container">
        <h1>Selamat Datang di Pemesanan Kereta Api</h1>

          <div class="card" onclick="location.href='/routes'">

            <div class="icon green">📅</div>
            <h3>Pesan Tiket</h3>
            <div class="desc">Book your ticket easily</div>
          </div>

          <div class="card" onclick="location.href='/ticket'">
            <div class="icon purple">🎫</div>

          </div>

        </div>
