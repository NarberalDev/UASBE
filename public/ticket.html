<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tiket Saya - Aplikasi Pemesanan Kereta</title>
  <link rel="stylesheet" href="ticket.css">
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
  <button class="back-btn" id="navBack" onclick="handleNavBack()">←</button>
  <div class="logo-box">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M4 4h16c1.1 0 2 .9 2 2v8c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2zm0 2v8h16V6H4zm2 9h2v2H6v-2zm10 0h2v2h-2v-2zM8 8h8v4H8V8z"/>
    </svg>
  </div>
  <h1 id="navTitle">Tiket Saya</h1>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- ===== SCREEN: LIST TIKET ===== -->
<div class="screen active" id="screen-list">
  <div class="tiket-container">
    <div class="tiket-header">
      <div>
        <h2>Tiket Saya</h2>
        <p>Daftar pemesanan tiket kereta Anda</p>
      </div>
      <button class="btn-new" onclick="window.location.href='book.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Pesan Tiket
      </button>
    </div>

    <div id="ticketListContainer"></div>
  </div>
</div>

<!-- ===== SCREEN: E-TICKET ===== -->
<div class="screen" id="screen-etiket">
  <div class="etiket-container">
    <div class="etiket-card" id="etiketCard">

      <!-- Header strip -->
      <div class="etiket-header-strip">
        <div class="label">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 4h16c1.1 0 2 .9 2 2v8c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2zm0 2v8h16V6H4zm2 9h2v2H6v-2zm10 0h2v2h-2v-2zM8 8h8v4H8V8z"/>
          </svg>
          E-TICKET
        </div>
        <div class="ticket-num" id="et-ticketId">TRN-...</div>
      </div>

      <!-- Route banner -->
      <div class="etiket-route-banner">
        <div class="etiket-city">
          <div class="city-code" id="et-originCode">MDN</div>
          <div class="city-name" id="et-origin">Medan</div>
        </div>

        <div class="etiket-route-mid">
          <div class="train-name" id="et-trainName">Kereta Express 101</div>
          <div class="arrow-line">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="5" y1="12" x2="19" y2="12"/>
              <polyline points="12 5 19 12 12 19"/>
            </svg>
          </div>
          <div class="time-range" id="et-time">08:00 – 09:30</div>
        </div>

        <div class="etiket-city" style="text-align:right">
          <div class="city-code" id="et-destCode">TBT</div>
          <div class="city-name" id="et-destination">Tebing Tinggi</div>
        </div>
      </div>

      <!-- Info grid -->
      <div class="etiket-info">
        <div class="etiket-field">
          <label>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
            Nama Penumpang
          </label>
          <div class="value" id="et-name">—</div>
        </div>

        <div class="etiket-field">
          <label>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            Tanggal Berangkat
          </label>
          <div class="value" id="et-date">—</div>
        </div>

        <div class="etiket-field">
          <label>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M5 10V6a2 2 0 012-2h10a2 2 0 012 2v4M3 18h18M5 10h14l1 8H4l1-8z"/>
            </svg>
            Kursi
          </label>
          <div class="value mono" id="et-seats">—</div>
        </div>

        <div class="etiket-field">
          <label>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"/><path d="M12 2v2m0 16v2M2 12h2m16 0h2"/>
            </svg>
            Kelas
          </label>
          <div class="value" id="et-class">—</div>
        </div>

        <div class="etiket-field">
          <label>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
            Jumlah Penumpang
          </label>
          <div class="value" id="et-passengers">—</div>
        </div>

        <div class="etiket-field">
          <label>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/>
            </svg>
            Metode Bayar
          </label>
          <div class="value" id="et-payment">—</div>
        </div>
      </div>

      <!-- Tear divider -->
      <div class="tear-divider"></div>

      <!-- QR Section -->
      <div class="etiket-qr">
        <div>
          <div class="qr-box">
            <canvas id="qrCanvas"></canvas>
          </div>
          <div class="qr-label" id="et-qrLabel">TRN-...</div>
        </div>

        <div class="qr-info">
          <div class="scan-msg">Tunjukkan ke petugas</div>
          <div class="scan-sub">Scan QR Code ini saat boarding di stasiun keberangkatan. Pastikan kode terlihat jelas.</div>

          <div class="total-payment">
            <div class="tlabel">Total Pembayaran</div>
            <div class="tamount" id="et-totalPrice">Rp 0</div>
          </div>
        </div>
      </div>

      <!-- Actions -->
      <div class="etiket-actions">
        <button class="btn-back-list" onclick="showListScreen()">← Kembali ke Daftar</button>
        <button class="btn-print" onclick="window.print()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
            <polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/>
          </svg>
          Cetak / Simpan PDF
        </button>
      </div>

    </div>
  </div>
</div>

<!-- ===== QR Library (pure JS, no CDN needed) ===== -->
<script>
/* Minimal QR renderer using a tiny QR lib */
/* We'll use a simple visual pattern as placeholder for demo */
function drawQR(canvasEl, text) {
  const size = 110;
  canvasEl.width = size;
  canvasEl.height = size;
  const ctx = canvasEl.getContext('2d');
  ctx.fillStyle = 'white';
  ctx.fillRect(0, 0, size, size);

  // Simple hash-based pattern for visual QR placeholder
  const cells = 21;
  const cSize = size / cells;
  ctx.fillStyle = '#0A1628';

  // Fixed position patterns (QR corner markers)
  function drawFinder(ox, oy) {
    ctx.fillStyle = '#0A1628';
    ctx.fillRect(ox * cSize, oy * cSize, 7 * cSize, 7 * cSize);
    ctx.fillStyle = 'white';
    ctx.fillRect((ox + 1) * cSize, (oy + 1) * cSize, 5 * cSize, 5 * cSize);
    ctx.fillStyle = '#0A1628';
    ctx.fillRect((ox + 2) * cSize, (oy + 2) * cSize, 3 * cSize, 3 * cSize);
  }
  drawFinder(0, 0);
  drawFinder(14, 0);
  drawFinder(0, 14);

  // Data modules from hash
  function strHash(s) {
    let h = 5381;
    for (let i = 0; i < s.length; i++) h = ((h << 5) + h) ^ s.charCodeAt(i);
    return h >>> 0;
  }
  let seed = strHash(text);
  function rand() {
    seed ^= seed << 13; seed ^= seed >> 17; seed ^= seed << 5;
    return (seed >>> 0) / 0xFFFFFFFF;
  }

  ctx.fillStyle = '#0A1628';
  for (let r = 0; r < cells; r++) {
    for (let c = 0; c < cells; c++) {
      const inFinder = (r < 8 && c < 8) || (r < 8 && c > 12) || (r > 12 && c < 8);
      if (inFinder) { rand(); continue; }
      if (rand() > 0.5) {
        ctx.fillRect(c * cSize, r * cSize, cSize, cSize);
      }
    }
  }
  // Timing patterns
  ctx.fillStyle = '#0A1628';
  for (let i = 8; i < 13; i++) {
    if (i % 2 === 0) {
      ctx.fillRect(i * cSize, 6 * cSize, cSize, cSize);
      ctx.fillRect(6 * cSize, i * cSize, cSize, cSize);
    }
  }
}
</script>

<script>
// ===== STORAGE KEY =====
const STORAGE_KEY = 'kereta_tickets';

// ===== LOAD TICKETS =====
function loadTickets() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  } catch { return []; }
}

function saveTickets(tickets) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(tickets));
}

// ===== GET CITY CODE =====
function cityCode(name) {
  const map = {
    'Medan': 'MDN',
    'Tebing Tinggi': 'TBT',
    'Pematang Siantar': 'PMS',
    'Kisaran': 'KSR',
    'Rantau Prapat': 'RTP'
  };
  return map[name] || name.slice(0, 3).toUpperCase();
}

// ===== FORMAT DATE =====
function formatDate(dateStr) {
  if (!dateStr) return '-';
  const d = new Date(dateStr);
  return d.toLocaleDateString('id-ID', { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' });
}

// ===== FORMAT PRICE =====
function formatPrice(n) {
  return 'Rp ' + parseInt(n).toLocaleString('id-ID');
}

// ===== RENDER TICKET LIST =====
function renderList() {
  const tickets = loadTickets();
  const container = document.getElementById('ticketListContainer');

  if (tickets.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="2" y="5" width="20" height="14" rx="2"/>
          <path d="M2 10h20M8 15h2M14 15h2"/>
        </svg>
        <h3>Belum ada tiket</h3>
        <p>Mulai pesan tiket kereta pertama Anda sekarang!</p>
      </div>`;
    return;
  }

  container.innerHTML = '';
  tickets.slice().reverse().forEach((t, i) => {
    const total = (t.price || 0) * (t.passengers || 1);
    const el = document.createElement('div');
    el.className = 'ticket-card';
    el.style.animationDelay = (i * 0.06) + 's';
    el.innerHTML = `
      <div class="ticket-top">
        <div class="ticket-id">${t.ticketId || '—'}</div>
        <div class="ticket-status">Confirmed</div>
      </div>
      <div class="ticket-route">
        <div class="station-name">${t.origin || '—'}</div>
        <div class="route-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
          </svg>
        </div>
        <div class="station-name">${t.destination || '—'}</div>
      </div>
      <div class="ticket-meta">
        <div class="meta-item">
          <label>Tanggal</label>
          <span>${t.date ? new Date(t.date).toLocaleDateString('id-ID', {day:'2-digit', month:'short', year:'numeric'}) : '—'}</span>
        </div>
        <div class="meta-item">
          <label>Kelas</label>
          <span>${t.className || '—'}</span>
        </div>
        <div class="meta-item">
          <label>Kursi</label>
          <span>${(t.seats || []).join(', ') || '—'}</span>
        </div>
      </div>
      <div class="ticket-footer">
        <div class="ticket-price">${formatPrice(total)}</div>
        <button class="btn-view-ticket" onclick="showEtiket('${t.ticketId}')">Lihat E-Tiket →</button>
      </div>
    `;
    container.appendChild(el);
  });
}

// ===== SHOW E-TICKET =====
function showEtiket(ticketId) {
  const tickets = loadTickets();
  const t = tickets.find(x => x.ticketId === ticketId);
  if (!t) { showToast('Tiket tidak ditemukan'); return; }

  // Fill data
  document.getElementById('et-ticketId').textContent = t.ticketId;
  document.getElementById('et-originCode').textContent = cityCode(t.origin);
  document.getElementById('et-origin').textContent = t.origin;
  document.getElementById('et-destCode').textContent = cityCode(t.destination);
  document.getElementById('et-destination').textContent = t.destination;
  document.getElementById('et-trainName').textContent = t.trainName || 'Kereta Express 101';
  document.getElementById('et-time').textContent = (t.departureTime || '08:00') + ' – 09:30';
  document.getElementById('et-name').textContent = t.name;
  document.getElementById('et-date').textContent = formatDate(t.date);
  document.getElementById('et-seats').textContent = (t.seats || []).join(', ') || '—';
  document.getElementById('et-class').textContent = (t.className || '—') + ' Class';
  document.getElementById('et-passengers').textContent = (t.passengers || 1) + ' orang';
  document.getElementById('et-payment').textContent = t.paymentMethod || '—';
  document.getElementById('et-qrLabel').textContent = t.ticketId.slice(0, 18) + '...';

  const total = (t.price || 0) * (t.passengers || 1);
  document.getElementById('et-totalPrice').textContent = formatPrice(total);

  // Draw QR
  const canvas = document.getElementById('qrCanvas');
  drawQR(canvas, t.ticketId);

  // Switch screen
  document.getElementById('screen-list').classList.remove('active');
  document.getElementById('screen-etiket').classList.add('active');
  document.getElementById('navTitle').textContent = 'E-Ticket';
  window.scrollTo(0, 0);
}

// ===== SHOW LIST SCREEN =====
function showListScreen() {
  document.getElementById('screen-etiket').classList.remove('active');
  document.getElementById('screen-list').classList.add('active');
  document.getElementById('navTitle').textContent = 'Tiket Saya';
}

// ===== NAV BACK =====
function handleNavBack() {
  const etiketActive = document.getElementById('screen-etiket').classList.contains('active');
  if (etiketActive) {
    showListScreen();
  } else {
    window.location.href = 'dashboard.html';
  }
}

// ===== TOAST =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ===== INIT =====
// If redirected from book.html with a new ticket in sessionStorage
(function checkNewTicket() {
  const raw = sessionStorage.getItem('new_ticket');
  if (raw) {
    sessionStorage.removeItem('new_ticket');
    const ticket = JSON.parse(raw);
    const tickets = loadTickets();
    // avoid duplicates
    if (!tickets.find(x => x.ticketId === ticket.ticketId)) {
      tickets.push(ticket);
      saveTickets(tickets);
    }
    renderList();
    // Auto-open e-ticket
    setTimeout(() => showEtiket(ticket.ticketId), 300);
  } else {
    renderList();
  }
})();
</script>
</body>
</html>
